name: Trading Bot

on:
  workflow_dispatch:   # manual trigger — set alarm for 9:15 AM IST

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 390   # 6.5 hours safety net (9:15 AM to 3:45 PM IST)

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify market hours (warn if triggered late)
        run: |
          IST=$(TZ='Asia/Kolkata' date +%H%M)
          echo "Triggered at IST: $(TZ='Asia/Kolkata' date +%H:%M:%S)"
          if [ "$IST" -gt "0930" ]; then
            echo "⚠️  WARNING: Started after 9:30 AM IST — some ticks already missed"
          else
            echo "✅ On time!"
          fi

      - name: Run Collector and Strategy in Parallel
        env:
          DB_HOST: "ep-morning-lake-aoiahvcv-pooler.c-2.ap-southeast-1.aws.neon.tech"
          DB_PORT: "5432"
          DB_NAME: "Trade"
          DB_USER: "neondb_owner"
          DB_PASSWORD: "npg_YCL6POljqg9i"
        run: |
          echo "🚀 Starting collector..."
          python collector.py --symbol NIFTY --loop 60 &
          COLLECTOR_PID=$!

          echo "⏳ Waiting 5 minutes for collector to build initial ticks..."
          sleep 300

          echo "🚀 Starting strategy..."
          python strategy.py NIFTY --paper --loop 60 &
          STRATEGY_PID=$!

          echo "Both running. Waiting for market close self-exit..."
          wait $COLLECTOR_PID $STRATEGY_PID
          echo "✅ Both scripts exited cleanly at market close."