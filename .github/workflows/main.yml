name: Trading Bot

on:
  schedule:
    - cron: '0 2 * * 1-5'  # 7:30am IST = 2:00am UTC, Mon-Fri
  workflow_dispatch:          # manual trigger for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 510      # 8.5 hours — 7:30am to 4:00pm IST buffer

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Market Open
        run: |
          echo "Bot started early. Waiting for 9:30am IST..."
          while [ "$(TZ='Asia/Kolkata' date +%H%M)" -lt "0930" ]; do
            echo "Current IST time: $(TZ='Asia/Kolkata' date +%H:%M) — waiting..."
            sleep 60
          done
          echo "✅ Market open! Starting scripts now..."

      - name: Run Collector and Strategy in Parallel
        env:
          DB_HOST: "ep-morning-lake-aoiahvcv-pooler.c-2.ap-southeast-1.aws.neon.tech"
          DB_PORT: "5432"
          DB_NAME: "Trade"
          DB_USER: "neondb_owner"
          DB_PASSWORD: "npg_YCL6POljqg9i"
        run: |
          # Start collector first
          python collector.py --symbol NIFTY --loop 60 &
          COLLECTOR_PID=$!

          # Wait 5 minutes for collector to build initial ticks
          echo "Waiting 5 minutes for collector to build ticks..."
          sleep 300

          # Start strategy in paper mode
          python strategy.py NIFTY --paper --loop 60 &
          STRATEGY_PID=$!

          # Wait for both to finish
          wait $COLLECTOR_PID $STRATEGY_PID