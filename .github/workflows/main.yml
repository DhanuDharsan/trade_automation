name: Trading Bot

on:
  schedule:
    - cron: '0 4 * * 1-5'  # 9:30am IST = 4:00am UTC, Monday-Friday
  workflow_dispatch:  # allows manual trigger for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Collector
        env:
          DB_HOST: "ep-morning-lake-aoiahvcv-pooler.c-2.ap-southeast-1.aws.neon.tech"
          DB_PORT: "5432"
          DB_NAME: "Trade"
          DB_USER: "neondb_owner"
          DB_PASSWORD: "npg_YCL6POljqg9i"
        run: python collector.py

      - name: Run Strategy
        env:
          DB_HOST: "ep-morning-lake-aoiahvcv-pooler.c-2.ap-southeast-1.aws.neon.tech"
          DB_PORT: "5432"
          DB_NAME: "Trade"
          DB_USER: "neondb_owner"
          DB_PASSWORD: "npg_YCL6POljqg9i"
        run: python strategy.py